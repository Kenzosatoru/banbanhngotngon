<html>
<head>
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="dk.css">
</head>
<body>
    <div class="register-container">
        <div class="auth-card">
        <div class="auth-toggle">
            <button id="loginBtn">Đăng Nhập</button>
            <button id="registerBtn" class="active" >Đăng Ký</button>
        </div>
        <form class="register-form">
            <h2>Hãy Tạo Tài Khoản </h2>
            <div class="group">
                <label>Họ và tên</label>
                <input type="text" placeholder="Nhập Đầy đủ tên " required>
            </div>
            <div class="group">
                <label>Email</label>
                <input type="email" id="em" placeholder="Nhập email Hoặc Số Điện Thoại" required>
            </div>
            <div class="group">
                <label>Mật khẩu</label>
                <input type="password"  placeholder="Nhập Mật Khẩu " required>
            </div>
            <button type="submit">Đăng Ký</button>
            <p>Đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a></p>
        </form>
    </div>
</body>
</html>
