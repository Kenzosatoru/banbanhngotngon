<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Thanh Toán </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Đảm bảo padding không làm tràn khung */
        }
        .row { display: flex; gap: 10px; }
        .btn-pay {
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-pay:hover { background-color: #218838; }
        .summary {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Thanh Toán</h2>

    <div class="summary">
        <strong>Sản phẩm:</strong> Bánh mò <br>
        <strong>Tổng cộng:</strong> 2 tỷ VNĐ
    </div>

    <form action="#">
        <div class="form-group">
            <label for="name">Họ và Tên</label>
            <input type="text" id="name" placeholder="Nguyễn Văn A" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="vi-du@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="address">Địa chỉ giao hàng</label>
            <input type="text" id="address" placeholder="Số nhà, tên đường..." required>
        </div>

        <div class="form-group">
            <label for="card">Số thẻ tín dụng</label>
            <input type="text" id="card" placeholder="1111-2222-3333-4444" required>
        </div>

        <div class="row">
            <div class="form-group" style="flex: 2;">
                <label for="expiry">Hết hạn</label>
                <input type="text" id="expiry" placeholder="MM/YY" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" required>
            </div>
        </div>

        <button type="submit" class="btn-pay">Xác Nhận Thanh Toán</button>
    </form>
</div>

</body>
</html>
